name: Deploy to VM

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          PUBLIC_URL: /
          CI: false

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            rm -rf /home/sixgo_admin/FE/Tool/_incoming
            mkdir -p /home/sixgo_admin/FE/Tool/_incoming
            rm -rf /home/sixgo_admin/FE/ToolMY/_incoming
            mkdir -p /home/sixgo_admin/FE/ToolMY/_incoming

      - name: Copy build to VM (Vietnam)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: build/*
          target: /home/sixgo_admin/FE/Tool/_incoming
          strip_components: 1
          rm: false

      - name: Copy build to VM (Malaysia)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: build/*
          target: /home/sixgo_admin/FE/ToolMY/_incoming
          strip_components: 1
          rm: false

      - name: Deploy and restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # --- Vietnam (tool.6ixgo.com) ---
            DEPLOY_DIR=~/FE/Tool
            INCOMING="$DEPLOY_DIR/_incoming"
            LIVE="$DEPLOY_DIR/live"
            APP_NAME="tool_6ixgo"
            PORT=3100

            rm -rf "$LIVE"
            mv "$INCOMING" "$LIVE"

            command -v serve >/dev/null 2>&1 || sudo npm install -g serve

            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              pm2 serve "$LIVE" "$PORT" --name "$APP_NAME" --spa
            fi

            echo "Deployed $APP_NAME on port $PORT"

            # --- Malaysia (tool.6ixgo.my) ---
            DEPLOY_DIR_MY=~/FE/ToolMY
            INCOMING_MY="$DEPLOY_DIR_MY/_incoming"
            LIVE_MY="$DEPLOY_DIR_MY/live"
            APP_NAME_MY="tool_6ixgo_my"
            PORT_MY=3102

            rm -rf "$LIVE_MY"
            mv "$INCOMING_MY" "$LIVE_MY"

            if pm2 describe "$APP_NAME_MY" > /dev/null 2>&1; then
              pm2 restart "$APP_NAME_MY" --update-env
            else
              pm2 serve "$LIVE_MY" "$PORT_MY" --name "$APP_NAME_MY" --spa
            fi

            pm2 save

            echo "Deployed $APP_NAME_MY on port $PORT_MY"
